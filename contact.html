<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Aaliyah Nxumalo</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
    <header>
        <div class="container">
            <h1 class="logo">Aaliyah Nxumalo</h1>
            <nav aria-label="Main Navigation">
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="cv.html">CV</a></li>
                    <li><a href="portfolio.html">Portfolio</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
                <button class="nav-toggle" aria-label="Toggle navigation">&#9776;</button>
            </nav>
        </div>
    </header>

    <main>
        <section class="contact-section" aria-label="Contact Information">
            <header>
                <h1>Contact Me</h1>
            </header>

            <aside>
                <p><i class="fa-solid fa-envelope"></i> alialundeka@gmail.com</p>
                <p><i class="fa-brands fa-linkedin"></i> <a href="https://www.linkedin.com/in/aaliyah-nxumalo-57018b246" target="_blank">LinkedIn Profile</a></p>
                <p><i class="fa-brands fa-github"></i> <a href="https://github.com/Luuhndekarh">GitHub Profile</a></p>
            </aside>

            <article>
                <form id="contactForm" aria-label="Contact Form">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>

                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>

                    <label for="message">Message:</label>
                    <textarea id="message" name="message" required></textarea>

                    <button type="submit">Submit</button>
                </form>
            </article>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Aaliyah Nxumalo</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
